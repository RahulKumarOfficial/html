<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Success - Pro Web Editor</title>
    
    <!-- CodeMirror & FontAwesome Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --header-bg: #1e293b;
            --accent-color: #3b82f6;
            --border-color: #334155;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--white); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- Header Design --- */
        .navbar {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; 
            font-size: 1.3rem; 
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .logo span { color: var(--accent-color); }

        .btn-download {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-download:hover { background: #2563eb; transform: translateY(-1px); }

        /* --- Workspace Layout --- */
        .app-container {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
        }

        /* Editor Styling */
        #editor-panel {
            width: 50%;
            min-width: 50px;
            height: 100%;
            background: #272822;
        }
        .CodeMirror { 
            height: 100% !important; 
            font-size: 15px; 
            line-height: 1.5;
        }

        /* The Resizer Bar */
        #resizer-bar {
            width: 8px;
            background: var(--border-color);
            cursor: col-resize;
            transition: background 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #resizer-bar:hover, #resizer-bar.active { 
            background: var(--accent-color); 
        }
        #resizer-bar::after {
            content: "";
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* Preview Area */
        #preview-panel {
            flex: 1;
            background: #ffffff;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; background: #ffffff; }

        /* Mouse Event Mask */
        #drag-overlay { 
            display: none; 
            position: absolute; 
            inset: 0; 
            z-index: 99; 
        }

        /* --- Mobile Responsive Rules --- */
        @media (max-width: 650px) {
            .navbar { height: 55px; padding: 0 15px; }
            .logo { font-size: 1.1rem; }
            .btn-download span { display: none; } /* Mobile par text hide */

            .app-container { flex-direction: column; height: calc(100vh - 55px); }
            #editor-panel { width: 100% !important; height: 50%; }
            #resizer-bar { width: 100%; height: 8px; cursor: row-resize; }
            #resizer-bar::after { width: 30px; height: 2px; }
            #preview-panel { height: 50%; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DREAM<span>SUCCESS</span></div>
        <button class="btn-download" onclick="exportHTML()">
            <i class="fas fa-file-code"></i>
            <span>Download HTML</span>
        </button>
    </nav>

    <div class="app-container">
        <!-- Code Editor Section -->
        <div id="editor-panel">
            <textarea id="main-textarea"></textarea>
        </div>

        <!-- Splitter/Resizer Bar -->
        <div id="resizer-bar"></div>

        <!-- Live Preview Section -->
        <div id="preview-panel">
            <div id="drag-overlay"></div>
            <iframe id="output-frame"></iframe>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>

    <script>
        const editorPanel = document.getElementById('editor-panel');
        const resizer = document.getElementById('resizer-bar');
        const overlay = document.getElementById('drag-overlay');
        const output = document.getElementById('output-frame');

        // 1. Initialize CodeMirror with Line Wrapping
        const editor = CodeMirror.fromTextArea(document.getElementById('main-textarea'), {
            mode: "text/html",
            theme: "monokai",
            lineNumbers: true,
            autoCloseTags: true,
            tabSize: 2,
            lineWrapping: true // Long code lines wrap automatically
        });

        // 2. Resizer & Width Adjustment Logic
        let isResizing = false;

        resizer.onmousedown = () => { 
            isResizing = true; 
            overlay.style.display = 'block'; 
            resizer.classList.add('active');
        };

        document.onmousemove = (e) => {
            if (!isResizing) return;

            if (window.innerWidth > 650) {
                // Desktop horizontal resize
                let percentage = (e.clientX / window.innerWidth) * 100;
                if (percentage > 10 && percentage < 90) {
                    editorPanel.style.width = percentage + '%';
                }
            } else {
                // Mobile vertical resize
                let topH = ((e.clientY - 55) / (window.innerHeight - 55)) * 100;
                if (topH > 10 && topH < 90) {
                    editorPanel.style.height = topH + '%';
                }
            }
        };

        document.onmouseup = () => { 
            isResizing = false; 
            overlay.style.display = 'none'; 
            resizer.classList.remove('active');
        };

        // 3. Live Preview & LocalStorage with Default Boilerplate
        const updateOutput = () => {
            const code = editor.getValue();
            const doc = output.contentDocument;
            doc.open();
            doc.write(code);
            doc.close();
            localStorage.setItem('ds_pro_v8', code);
        };

        editor.on('change', updateOutput);

        // Load Saved Code or Default Boilerplate
        const savedData = localStorage.getItem('ds_pro_v8');
        if (savedData) {
            editor.setValue(savedData);
        } else {
            const boilerplate = `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dream Success Project</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; }
    h1 { color: #3b82f6; }
  </style>
</head>
<body>

  <h1>DREAM SUCCESS</h1>
  <p>Start writing your HTML code here...</p>

</body>
</html>`;
            editor.setValue(boilerplate);
        }

        // 4. Download Export Function
        function exportHTML() {
            const blob = new Blob([editor.getValue()], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'dream-success-export.html';
            a.click();
        }
    </script>
</body>
</html>
