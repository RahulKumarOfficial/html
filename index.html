<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Pro IDE - Final</title>
    
    <!-- External Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --header: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --resizer: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Navbar Layout */
        .navbar {
            height: 60px;
            background: var(--header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #2d3748;
            flex-shrink: 0;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); }
        .logo span { color: white; }

        .controls { display: flex; gap: 6px; align-items: center; }

        select, button {
            background: #334155;
            color: white;
            border: none;
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); }
        .btn-icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }

        /* Workspace */
        .app-main { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }
        #editor-container { width: 50%; height: 100%; background: #272822; }
        .CodeMirror { height: 100% !important; font-size: 14px; }

        #gutter {
            width: 10px;
            background: var(--resizer);
            cursor: col-resize;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #preview-container { flex: 1; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        #drag-mask { display: none; position: absolute; inset: 0; z-index: 99; }

        /* Modes */
        .fullscreen-preview #editor-container, 
        .fullscreen-preview #gutter { display: none; }

        @media (max-width: 700px) {
            .navbar { height: auto; padding: 10px; flex-direction: column; gap: 8px; }
            .app-main { flex-direction: column; }
            #editor-container { width: 100% !important; height: 50%; }
            #gutter { width: 100%; height: 10px; cursor: row-resize; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DREAM<span>SUCCESS</span></div>
        
        <div class="controls">
            <!-- Project Selector -->
            <select id="project-list" onchange="switchProject()"></select>
            <button onclick="addNewProject()" title="Add Project"><i class="fas fa-plus"></i></button>
            <button class="btn-red" onclick="deleteCurrentProject()" title="Delete Project"><i class="fas fa-trash-alt"></i></button>
            
            <!-- History Tools -->
            <button class="btn-icon" onclick="editor.undo()" title="Undo"><i class="fas fa-undo"></i></button>
            <button class="btn-icon" onclick="editor.redo()" title="Redo"><i class="fas fa-redo"></i></button>

            <!-- Action Tools -->
            <button class="btn-blue btn-icon" onclick="toggleFS()" title="Full Preview"><i class="fas fa-expand"></i></button>
            <button class="btn-blue" onclick="downloadCode()"><i class="fas fa-save"></i> <span class="hide-mobile">Save</span></button>
        </div>
    </nav>

    <div class="app-main">
        <div id="editor-container">
            <textarea id="real-editor"></textarea>
        </div>
        <div id="gutter"></div>
        <div id="preview-container">
            <div id="drag-mask"></div>
            <iframe id="iframe-output"></iframe>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>

    <script>
        const editorPanel = document.getElementById('editor-container');
        const gutter = document.getElementById('gutter');
        const mask = document.getElementById('drag-mask');
        const iframe = document.getElementById('iframe-output');
        const projectDrop = document.getElementById('project-list');
        
        const baseHTML = `<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="utf-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1">\n  <title>New Project</title>\n</head>\n<body>\n  <h1>Welcome!</h1>\n</body>\n</html>`;

        // 1. Setup Editor
        const editor = CodeMirror.fromTextArea(document.getElementById('real-editor'), {
            mode: "text/html",
            theme: "monokai",
            lineNumbers: true,
            lineWrapping: true,
            autoCloseTags: true,
            autoCloseBrackets: true
        });

        // 2. Logic & Persistence
        function getStore() {
            return JSON.parse(localStorage.getItem('ds_v11_projects')) || { "Project_1": baseHTML };
        }

        function saveToStore(data) {
            localStorage.setItem('ds_v11_projects', JSON.stringify(data));
        }

        function getActiveProjectName() {
            return localStorage.getItem('ds_v11_last_active') || "Project_1";
        }

        function refreshUI() {
            const projects = getStore();
            const lastActive = getActiveProjectName();
            projectDrop.innerHTML = "";
            
            Object.keys(projects).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                if(name === lastActive) opt.selected = true;
                projectDrop.appendChild(opt);
            });
            
            // Current project content load karein
            editor.setValue(projects[lastActive] || baseHTML);
        }

        function switchProject() {
            // Purane project ka code save karein
            const projects = getStore();
            const oldActive = getActiveProjectName();
            projects[oldActive] = editor.getValue();
            saveToStore(projects);

            // Naya project set karein
            const newActive = projectDrop.value;
            localStorage.setItem('ds_v11_last_active', newActive);
            editor.setValue(projects[newActive]);
        }

        function addNewProject() {
            const name = prompt("Project Name:", "Project_" + Date.now().toString().slice(-3));
            if(name) {
                const projects = getStore();
                projects[name] = baseHTML;
                saveToStore(projects);
                localStorage.setItem('ds_v11_last_active', name);
                refreshUI();
            }
        }

        function deleteCurrentProject() {
            const projects = getStore();
            const current = getActiveProjectName();
            
            if(Object.keys(projects).length <= 1) {
                alert("Kam se kam ek project hona zaroori hai!");
                return;
            }

            if(confirm(`Kya aap "${current}" ko delete karna chahte hain?`)) {
                delete projects[current];
                const nextProject = Object.keys(projects)[0];
                saveToStore(projects);
                localStorage.setItem('ds_v11_last_active', nextProject);
                refreshUI();
            }
        }

        // 3. Resizer
        let dragging = false;
        const start = () => { dragging = true; mask.style.display = 'block'; };
        const end = () => { dragging = false; mask.style.display = 'none'; };
        const move = (e) => {
            if (!dragging) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            if (window.innerWidth > 700) {
                let p = (x / window.innerWidth) * 100;
                if (p > 5 && p < 95) editorPanel.style.width = p + '%';
            } else {
                let h = ((y - 100) / (window.innerHeight - 100)) * 100;
                if (h > 10 && h < 90) editorPanel.style.height = h + '%';
            }
        };

        gutter.addEventListener('mousedown', start);
        gutter.addEventListener('touchstart', start);
        document.addEventListener('mousemove', move);
        document.addEventListener('touchmove', move);
        document.addEventListener('mouseup', end);
        document.addEventListener('touchend', end);

        // 4. Runtime Update
        editor.on('change', () => {
            const code = editor.getValue();
            const doc = iframe.contentDocument;
            doc.open(); doc.write(code); doc.close();
            
            // Auto Save current project code
            const projects = getStore();
            projects[getActiveProjectName()] = code;
            saveToStore(projects);
        });

        function toggleFS() { document.body.classList.toggle('fullscreen-preview'); }

        window.onload = refreshUI;

        function downloadCode() {
            const blob = new Blob([editor.getValue()], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = getActiveProjectName() + '.html';
            a.click();
        }
    </script>
</body>
</html>
